system:
  name: 潮汐
  version: "2.0"
  mode: shadow            # shadow=影子盘只监控不下单；live=实盘执行

# 箱体参数（不要动，除非 BTC 进入全新价格区间 ATH $126K+）
box:
  mother:
    lower: 58000
    upper: 88000
  center_axis: 73000
  small:                     # 由 calc_small_box 每4小时自动更新写入 state.json
    lower: 73000
    upper: 78000
    center: 75500

# 破箱4因子共振阈值（缺一不可）
breakout:
  price_pct: 1.5          # 实体收盘突破≥1.5%
  vol_ratio: 2.0          # 量比≥2x（相对前20根1m均量）
  oi_change_pct: 5.0      # OI变化≥5%
  funding_rate: 0.0005    # 资金费率极端≥0.05%

# 仓位参数
position:
  in_margin_usd: 1000     # cw1: 在场保证金上限
  reserve_usd: 3000       # cw2: 场外保证金池
  base_usd: 100           # 基础仓位单位（加仓倍数的基数）
  single_order_limit: 500 # fk1: 单笔上限

# TODO: rc1 入场触发参数（首次入场条件、是否需要区段稳定N分钟）
# TODO: jc1 加仓触发参数（加仓间距/频率限制，防止区段快速切换导致频繁加仓）
# TODO: js1 减仓触发参数（减仓到线是否需要确认延迟）
# TODO: mr1 保证金补给规则（补给时机、补给金额、场外池低水位报警）
