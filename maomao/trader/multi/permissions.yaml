# 角色权限配置 v1.0（2026-04-19）
# 匹配逻辑：
#   - "*"     表示全部账户
#   - "!X"    表示排除账户 X（优先于 *）
#   - 具名    ["币安1","币安2"] 精确匹配
# 动作类型：
#   query  — 查询（余额/持仓/挂单/历史）
#   trade  — 执行（开仓/平仓/挂单/撤单/移动止盈等）
#   admin  — 配置（启停账户/改权限/改策略绑定/删除）
# 热重载：permissions.py 每次调用检查 mtime，变了自动重载，不用重启

roles:
  大猫:
    description: 技术员工，开发运维，默认全权限
    query: ["*"]
    trade: ["*"]
    admin: ["*"]

  玄玄:
    description: 乌鸦的女儿，交易执行+陪伴，全账户代理人
    query: ["*"]
    trade: ["*"]
    admin: ["*"]

  天天:
    description: AI交易员+客服；trade 仅限币安2（震天响本人账户），query 可看币安2/3/4
    query: ["*", "!币安1"]
    trade: ["币安2"]       # 2026-04-20 收紧：只能交易自己账户，不碰 3/4
    admin: []              # 不开放配置/删除

