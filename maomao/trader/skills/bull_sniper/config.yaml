bull_sniper:
  enabled: true
  mode: off                  # auto / alert / off（第一阶段用off，纯记录）

  # 扫描
  scan_interval_sec: 30
  watchpool_max: 10
  watchpool_timeout_min: 30
  watchpool_refresh_sec: 10

  # 双层触发
  radar_1m_change: 3         # 1分钟涨幅%（雷达预警）
  confirm_5m_change: 5       # 5分钟涨幅%（确认进池）

  # 狙击窗口
  snipe_window_min: 10       # 最低介入涨幅%
  snipe_window_max: 18       # 最高介入涨幅%，超过放弃

  # 过滤
  min_listing_days: 30
  exclude_24h_above: 30
  exclude_daily_vol_below: 5000000
  min_drop_from_ath: 50      # 距高点跌幅<50%排除（未腰斩不碰）

  # AI判断（第二阶段启用）
  ai:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
  ai_auto_threshold: 75
  ai_alert_threshold: 60
  ai_mid_cap_threshold: 80

  # 仓位（统一20U）
  position_usd: 20
  default_leverage: 5
  max_position_usd: 50000    # 安全阀上限，防bug
  max_slippage_pct: 1        # 滑点>1%仓位减半，>2%放弃

  # 移动止盈（v3.1单一规则）
  trailing:
    activation_pct: 40       # 浮盈≥40%激活
    pullback_trigger: 25     # 回撤25%触发
    tolerance: 3             # 容错防抖3%

  # 风控
  max_concurrent_positions: 3
  daily_loss_limit_usd: 5000
  btc_circuit_breaker_pct: 2

  # 冷却
  cooldown_after_tp_hours: 4
  cooldown_after_sl_hours: 8

  # 分析器
  analyzer:
    enabled: true                  # 手工总开关
    stage1_enabled: true           # 第一阶段开关（8%快速通道）
    stage1_gain_pct: 8             # 第一阶段触发涨幅%
    stage2_enabled: true           # 第二阶段开关（打分通道）
    stage2_gain_min: 10            # 第二阶段最低涨幅%
    stage2_gain_max: 20            # 第二阶段最高涨幅%
    signal_threshold: 30           # 推送阈值（实战后调大）
    delist_enabled: true           # 下架反拉通道开关

  # 评分参数（实战后可调）
  scoring:
    news_major: 15
    news_minor: 5
    gain_10_15: 10
    gain_15_20: 20
    oi_up: 10
    oi_down: -5
    lsr_short_dominant: 10
    funding_extreme_threshold: 0.005   # 0.5%
    funding_extreme: 10
    vol_ratio_3x: 15
    vol_ratio_2x: 10
    vol_ratio_1_5x: 5
    vol_ratio_low: -5

  # 新闻配置
  news:
    enabled: true
    use_tavily: true              # Tavily主力（API key在.env）
    use_google_rss: true          # Google RSS备用
    use_coingecko: false
    tavily_api_key_env: TAVILY_API_KEY
    delist_keywords:
      - "delist"
      - "delisting"
      - "下架"
      - "摘牌"
      - "removed from"
    bullish_major_keywords:
      - "partnership"
      - "合作"
      - "listing"
      - "上线"
      - "mainnet"
      - "主网"
      - "upgrade"
      - "升级"
      - "etf"
      - "institutional"
      - "机构"
      - "acquisition"
      - "收购"
    bullish_minor_keywords:
      - "bullish"
      - "surge"
      - "rally"
      - "上涨"
      - "利好"
      - "突破"
    bearish_keywords:
      - "hack"
      - "exploit"
      - "rug"
      - "scam"
      - "fraud"
      - "黑客"
      - "跑路"
      - "欺诈"
      - "破产"
      - "bankruptcy"
