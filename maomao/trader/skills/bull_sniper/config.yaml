bull_sniper:
  enabled: true
  mode: auto                 # auto / alert / off
  group_notify: true         # 群组交易通知开关（开仓成功/失败推群组）

  # 扫描（30秒一轮，高频捕捉爆发）
  scan_interval_sec: 30
  watchpool_max: 30
  watchpool_refresh_sec: 60

  # ── 第一步：基础过滤 ──
  startup_max_change_pct: 50  # 启动时任意时段>50%排除（15→50）
  min_listing_days: 1
  ath_exempt_days: 180
  exclude_daily_vol_below: 20000000
  min_drop_from_ath: 60
  max_24h_change_pct: 30       # 24h涨>30%不进池+不买入（防拉完回抽）
  pool_exit_upper_pct: 20      # 池内涨幅>20%退出（不追高）
  pool_exit_lower_pct: 5       # 池内涨幅跌回<5%退出（动力不足）

  # ── 进池条件 ──
  # 第一层：瞬时触发（任意一条）
  pool_burst_1m: 12           # 1m涨>12%
  pool_burst_3m: 8            # 3m涨>8%
  pool_burst_5m: 7            # 5m涨>7%
  pool_burst_15m: 12          # 15m涨>12%
  # 第五条：阶梯型慢涨
  pool_stair_15m: 6            # 15m涨>6%
  pool_stair_vol_ratio: 1.5    # 量比>1.5x
  # 第二层（同时满足）
  min_oi_usdt: 5000000        # OI≥500万U

  # ── AI判断 ──
  ai:
    enabled: false
    provider: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
    timeout: 15
    final_decision: true       # AI最终买入决策

  # ── 仓位 ──
  position_usd: 50
  default_leverage: 5
  max_position_usd: 50000
  max_slippage_pct: 2          # 滑点>2%放弃（v3.1简化）
  min_available_balance: 150   # 可用余额<150U跳过

  # ── 移动止盈 ──
  custom_trailing_enabled: true   # true=限价单移动止盈，false=币安原生
  trailing:
    activation_pct: 50         # 浮盈≥50%激活（v3.1）
    pullback_trigger: 25
    tolerance: 3
  trailing_limit:
    activation_profit_pct: 50  # 浮盈≥50%激活
    pullback_pct: 40           # 回撤40%止盈
    poll_interval_sec: 30
    safety_above_entry: true   # 止盈价不低于开仓价

  # ── 滚仓 ──
  rolling:
    activation_pct: 90         # 浮盈≥90%触发（v3.1）
    profit_ratio: 0.6          # 加仓60%利润（v3.1）

  # ── E因子（捉妖） ──
  e_factor:
    enabled: true
    version: 2
    data_source: query-token-info-api3
    threshold: 28
    api_timeout: 5
    holders_snapshot: true
    log_detail: true
    e5_contract_safety: false

  # ── 风控 ──
  max_concurrent_positions: 10
  daily_loss_limit_usd: 5000
  btc_circuit_breaker_pct: 2

  # ── 冷却 ──
  cooldown_after_tp_hours: 12
  cooldown_after_sl_hours: 24
  cooldown_after_timeout_hours: 6
  cooldown_after_veto_min: 30
  cooldown_price_release_pct: 80        # 当前价≤入场价×80%解除冷却
  cooldown_price_release_on_sl: false   # 止损冷却不受价格解除影响
  position_timeout_hours: 24       # 持仓超时自动平仓

  # ── 分析器 ──
  analyzer:
    enabled: true
    signal_threshold: 28       # v2阈值（E因子满分+31）

  # ── 评分参数 v3.1 ──
  scoring:
    # A. 价格动能（互斥取最高）
    burst_1m_threshold: 8      # 1m涨>8%（12→8）
    burst_1m: 8
    burst_3m_threshold: 6      # 3m涨>6%（8→6）
    burst_3m: 7
    burst_5m_threshold: 5      # 5m涨>5%（7→5）
    burst_5m: 6

    # B. 1h趋势（互斥取最高，越早越高）
    gain_5_10: 7               # 初期（10→7）
    gain_10_15: 10             # 中期（8→10）
    gain_15_25: 8              # 强势（7→8）
    gain_25_40: 5              # 过热

    # C. 量比（互斥取最高）
    vol_ratio_5x: 10
    vol_ratio_3x: 7
    vol_ratio_2x: 6
    vol_ratio_1_5x: 5
    vol_ratio_low: -5

    # D. OI与资金费率（独立可叠加）
    oi_up_mild: 5              # 5-15%
    oi_up_strong: 8            # 15-30%
    oi_up_super: 10            # >30%
    oi_down: -5                # <-5%
    lsr_short_dominant: 2      # 多空比<0.8
    funding_extreme_threshold: 0.0005  # 0.05%
    funding_extreme: 3

    # E. 社交+聪明钱（读缓存）
    social_positive: 2
    social_burst: 5            # 替代+2
    social_burst_threshold: 100000  # 热度>10万
    smart_money_buy: 4         # direction=buy+status=valid
    smart_money_multi: 6       # smartMoneyCount≥3（替代+4）
    smart_money_multi_threshold: 3
    smart_money_large: 10      # totalTokenValue≥$5万（替代+6）
    smart_money_large_threshold: 50000
    smart_money_reduce: -10    # Smart Money Remove Holdings
    smart_money_wash: -8       # Insider Wash Trading

    # F. 链上转账（读缓存）
    chain_large_threshold: 200000     # $20万
    chain_large: 5                    # ≥1笔>$20万
    chain_whale_threshold: 1000000    # $100万
    chain_whale: 15                   # ≥1笔>$100万（叠加+5）
    chain_dense_count: 3              # ≥3笔>$20万
    chain_dense: 10                   # 密集独立叠加
    # 实时部分（后期加）
    chain_realtime_large_threshold: 200000
    chain_realtime_large: 10
    chain_realtime_whale_threshold: 500000
    chain_realtime_whale: 15          # 替代+10

    # G. 公告因子
    announce_new_listing: 5    # 新增合约
    announce_delist: -5        # 下架/SETTLING
