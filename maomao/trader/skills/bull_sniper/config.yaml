bull_sniper:
  enabled: true
  mode: auto                 # auto / alert / off
  group_notify: true         # 群组交易通知开关（开仓成功/失败推群组）

  # 扫描（30秒一轮，高频捕捉爆发）
  scan_interval_sec: 30
  watchpool_max: 50
  watchpool_refresh_sec: 60

  # ── 大币排除（不适合妖币策略）──
  exclude_symbols:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
    - ADAUSDT
    - DOGEUSDT
    - TRXUSDT
    - AVAXUSDT
    - DOTUSDT

  # ── 第一步：基础过滤 ──
  startup_max_change_pct: 50  # 启动时任意时段>50%排除（15→50）
  min_listing_days: 1
  ath_exempt_days: 180
  exclude_daily_vol_below: 20000000
  min_drop_from_ath: 0            # 取消ATH跌幅限制，进池不花钱，评分把关
  max_24h_change_pct: 50       # 24h涨>50%不进池+不买入（放宽，30%拦了太多妖币）
  pool_ttl_hours: 24            # 观察池保留时间（小时），超时未触发信号才退出

  # ── 进池条件 ──
  # 第一层：瞬时触发（任意一条）
  pool_burst_1m: 10           # 1m涨>10%（三选二·爆发）
  pool_burst_3m: 6            # 3m涨>6%（三选二·爆发）
  pool_burst_5m: 5            # 5m涨>5%（三选二·爆发）
  pool_burst_15m: 10          # 15m涨>10%（三选二·爆发）
  # 第五条：阶梯型慢涨
  pool_stair_15m: 5            # 15m涨>5%（原6，降1）
  pool_stair_vol_ratio: 1.5    # 量比>1.5x
  # 第六条：量比异常（大币已被市值排除，不需要涨幅并排）
  pool_vol_ratio_min: 2.0      # 量比≥2x（三选二）
  # ── 市值排除 ──
  mcap_exclude_top: 60         # CoinGecko市值前60名自动排除，24小时刷新
  # 第七条：聪明钱买入
  pool_smart_money_min_score: 4  # 聪明钱评分≥4进池（buy=4, 多地址=6, 大额=10）
  # 第二层（同时满足）
  min_oi_usdt: 3000000        # OI≥300万U

  # ── AI判断 ──
  ai:
    enabled: false
    provider: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
    timeout: 15
    final_decision: true       # AI最终买入决策

  # ── 仓位 ──
  position_usd: 100
  default_leverage: 5
  max_position_usd: 50000
  max_slippage_pct: 2          # 滑点>2%放弃（v3.1简化）
  min_available_balance: 150   # 可用余额<150U跳过

  # ── 移动止盈 ──
  custom_trailing_enabled: true   # true=限价单移动止盈，false=币安原生
  trailing:
    activation_pct: 50         # 浮盈≥50%激活（v3.1）
    pullback_trigger: 25
    tolerance: 3
  trailing_limit:
    activation_profit_pct: 50  # 浮盈≥50%激活
    pullback_pct: 40           # 回撤40%止盈
    poll_interval_sec: 30
    safety_above_entry: true   # 止盈价不低于开仓价

  # ── 滚仓 ──
  rolling:
    activation_pct: 90         # 浮盈≥90%触发（v3.1）
    profit_ratio: 0.6          # 加仓60%利润（v3.1）

  # ── E因子（捉妖） ──
  e_factor:
    enabled: true
    version: 2
    data_source: query-token-info-api3
    threshold: 28
    api_timeout: 5
    holders_snapshot: true
    log_detail: true
    e5_contract_safety: false

  # ── 风控 ──
  max_concurrent_positions: 10
  daily_loss_limit_usd: 5000
  btc_circuit_breaker_pct: 2

  # ── 冷却 ──
  cooldown_after_tp_hours: 12
  cooldown_after_sl_hours: 24
  cooldown_after_timeout_hours: 0      # 超时退出不设冷却，符合条件直接重新进池
  cooldown_after_veto_min: 30
  cooldown_price_release_pct: 100       # 当前价≤入场价就解除冷却（回到入场价以下=新机会）
  cooldown_price_release_on_sl: true    # 止损冷却也受价格解除（跌回来就是机会）
  position_timeout_hours: 24       # 持仓超时自动平仓

  # ── 分析器 ──
  analyzer:
    enabled: true
    signal_threshold: 28       # v2阈值（E因子满分+31）

  # ── 评分参数 v3.2（基于1417条实战数据优化） ──
  scoring:
    # A. 价格动能（互斥取最高，v3.2降门槛）
    burst_1m_threshold: 6      # 1m涨>6%（v3.2: 8→6）
    burst_1m: 8
    burst_3m_threshold: 4      # 3m涨>4%（v3.2: 6→4）
    burst_3m: 7
    burst_5m_threshold: 3      # 5m涨>3%（v3.2: 5→3）
    burst_5m: 6

    # B. 池内涨幅（互斥取最高，v3.2加低档+拓甜蜜区）
    gain_2_5: 4                # 萌芽2-5%（v3.2新增）
    gain_5_10: 7               # 初期5-8%
    gain_10_15: 10             # 甜蜜区8-18%（v3.2拓宽）
    gain_15_25: 8              # 强势18-30%
    gain_25_40: 5              # 过热30-40%
    gain_40_plus: 2            # 极端>40%（v3.2新增）

    # C. 量比（互斥取最高，v3.2减轻惩罚+填补空白）
    vol_ratio_5x: 10
    vol_ratio_3x: 7
    vol_ratio_2x: 6
    vol_ratio_1_5x: 5
    vol_ratio_1x: 2            # 1-1.5x正常（v3.2新增）
    vol_ratio_low: -1           # 萎缩<1x（v3.2: -5→-1）

    # D. OI（v3.2: 比较窗口5分钟→1小时，降门槛）
    oi_up_mild: 3              # 0.5-5%（v3.2: 门槛从5%降到0.5%）
    oi_up_strong: 5            # 5-20%（v3.2: 8→5）
    oi_up_super: 8             # >20%（v3.2: 门槛从30%降到20%）
    oi_down: -3                # <-5%（v3.2: -5→-3）

    # D. 多空比+费率
    lsr_short_dominant: 2      # 多空比<0.8
    funding_extreme_threshold: 0.0005  # 0.05%
    funding_extreme: 3
    # 费率波动幅度（v3.2新增，看变化不看刻度）
    funding_swing_low: 2       # 1h波动>0.02%
    funding_swing_high: 4      # 1h波动>0.05%（替代+2）

    # E. 由chain_score.py的E因子实现（最高+31，含否决）
    # 以下参数保留用于进池路径参考，评分走chain_score
    smart_money_buy: 4
    smart_money_multi: 6
    smart_money_multi_threshold: 3
    smart_money_large: 10
    smart_money_large_threshold: 50000

    # G. 公告因子
    announce_new_listing: 5    # 新增合约
    announce_delist: -5        # 下架/SETTLING
