bull_sniper:
  enabled: true
  mode: auto                 # auto / alert / off

  # 扫描（60分钟一轮，节能模式）
  scan_interval_sec: 3600
  watchpool_max: 30
  watchpool_refresh_sec: 60

  # ── 第一步：基础过滤 ──
  startup_max_change_pct: 15  # 启动时任意时段>15%排除（仅启动时生效）
  min_listing_days: 1
  ath_exempt_days: 180
  exclude_daily_vol_below: 20000000
  min_drop_from_ath: 60

  # ── 进池条件 ──
  # 第一层：瞬时触发（任意一条）
  pool_burst_1m: 12           # 1m涨>12%
  pool_burst_3m: 8            # 3m涨>8%
  pool_burst_5m: 7            # 5m涨>7%
  pool_burst_15m: 12          # 15m涨>12%
  # 第二层（同时满足）
  min_oi_usdt: 5000000        # OI≥500万U

  # ── AI判断 ──
  ai:
    enabled: true
    provider: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
    timeout: 15
    final_decision: true       # AI最终买入决策

  # ── 仓位 ──
  position_usd: 50
  default_leverage: 5
  max_position_usd: 50000
  max_slippage_pct: 2          # 滑点>2%放弃（v3.1简化）
  min_available_balance: 150   # 可用余额<150U跳过

  # ── 移动止盈 ──
  trailing:
    activation_pct: 50         # 浮盈≥50%激活（v3.1）
    pullback_trigger: 25
    tolerance: 3

  # ── 滚仓 ──
  rolling:
    activation_pct: 90         # 浮盈≥90%触发（v3.1）
    profit_ratio: 0.6          # 加仓60%利润（v3.1）

  # ── 风控 ──
  max_concurrent_positions: 10
  daily_loss_limit_usd: 5000
  btc_circuit_breaker_pct: 2

  # ── 冷却（v3.1：统一48h） ──
  cooldown_after_tp_hours: 48
  cooldown_after_sl_hours: 48
  cooldown_after_veto_min: 30

  # ── 分析器 ──
  analyzer:
    enabled: true
    signal_threshold: 25       # v3.1推送阈值（观察期）

  # ── 评分参数 v3.1 ──
  scoring:
    # A. 价格动能（互斥取最高）
    burst_1m_threshold: 12     # 1m涨>12%
    burst_1m: 8
    burst_3m_threshold: 8      # 3m涨>8%
    burst_3m: 7
    burst_5m_threshold: 7      # 5m涨>7%
    burst_5m: 6

    # B. 1h趋势（互斥取最高，越早越高）
    gain_5_10: 10              # 初期
    gain_10_15: 8              # 中期
    gain_15_25: 7              # 强势
    gain_25_40: 5              # 过热

    # C. 量比（互斥取最高）
    vol_ratio_5x: 18
    vol_ratio_3x: 15
    vol_ratio_2x: 10
    vol_ratio_1_5x: 5
    vol_ratio_low: -5

    # D. OI与资金费率（独立可叠加）
    oi_up_mild: 5              # 5-15%
    oi_up_strong: 8            # 15-30%
    oi_up_super: 10            # >30%
    oi_down: -5                # <-5%
    lsr_short_dominant: 2      # 多空比<0.8
    funding_extreme_threshold: 0.0005  # 0.05%
    funding_extreme: 3

    # E. 社交+聪明钱（读缓存）
    social_positive: 2
    social_burst: 5            # 替代+2
    social_burst_threshold: 100000  # 热度>10万
    smart_money_buy: 4         # direction=buy+status=valid
    smart_money_multi: 6       # smartMoneyCount≥3（替代+4）
    smart_money_multi_threshold: 3
    smart_money_large: 10      # totalTokenValue≥$5万（替代+6）
    smart_money_large_threshold: 50000
    smart_money_reduce: -10    # Smart Money Remove Holdings
    smart_money_wash: -8       # Insider Wash Trading

    # F. 链上转账（读缓存）
    chain_large_threshold: 200000     # $20万
    chain_large: 5                    # ≥1笔>$20万
    chain_whale_threshold: 1000000    # $100万
    chain_whale: 15                   # ≥1笔>$100万（叠加+5）
    chain_dense_count: 3              # ≥3笔>$20万
    chain_dense: 10                   # 密集独立叠加
    # 实时部分（后期加）
    chain_realtime_large_threshold: 200000
    chain_realtime_large: 10
    chain_realtime_whale_threshold: 500000
    chain_realtime_whale: 15          # 替代+10

    # G. 公告因子
    announce_new_listing: 5    # 新增合约
    announce_delist: -5        # 下架/SETTLING
