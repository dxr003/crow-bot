bull_sniper:
  enabled: true
  mode: "off"                 # auto / alert / off（必须加引号！YAML 1.1 把 off 解析成 False，导致 buyer.py:181 永远跳不进 mode=off 分支 → 4-27 凌晨 bn4 自动开 4 单根因）
  group_notify: true         # 群组交易通知开关（开仓成功/失败推群组）

  # ── 多账户执行（信号触发时并发执行，各账户独立） ──
  # 2026-04-19 扩展为4账户配置位；币安3/4 默认 enabled: false 不影响当前实盘
  # 未来如需 per-account mode 覆盖全局（off/alert/auto），再加 mode 字段即可
  accounts:
    币安1:
      enabled: false            # 接好但关着，乌鸦打开才会执行
      api_key_env: BINANCE_API_KEY
      secret_env: BINANCE_SECRET_KEY
    币安2:
      # 2026-04-25 12:18 开 bn2 实盘 → 2026-04-26 20:44 老大关闭（保留 bn4 单跑）
      enabled: false
      api_key_env: BINANCE2_API_KEY
      secret_env: BINANCE2_API_SECRET
    币安3:
      # 李红兵账户（大资金），bull_sniper 默认关闭，手动为主
      # key 在 /root/safe/lihongbing_binance.env，启用前需让 bull-sniper.service 加载此文件
      enabled: false
      api_key_env: LHB_BINANCE_API_KEY
      secret_env: LHB_BINANCE_API_SECRET
    币安4:
      # 专攻组六账户，保守策略，阈值待定
      # key 在 /root/safe/zhuangongliu_binance.env，启用前需让 bull-sniper.service 加载此文件
      # 2026-04-25 04:12 老大开启双跑（bn2+bn4 独立 5 笔）
      enabled: true
      api_key_env: ZGL_BINANCE_API_KEY
      secret_env: ZGL_BINANCE_API_SECRET

  # ═══════════════════════════════════════════════════════════════
  # 通用前置过滤链（在 Z 层之前，全市场 ticker 一进来就过）
  # 任一 filter 拒入 → 写 data/filter_log.jsonl，剔除该币
  # ═══════════════════════════════════════════════════════════════
  pre_filters:
    - exchange_info    # 下架/SETTLING/交割/TradFi 拦截，fail-closed (3 次失败即全拒)

  # ═══════════════════════════════════════════════════════════════
  # Z 层：前置筛选（全市场 → 候选池，2026-04-19 命名规范化）
  # Z-0 节奏 / Z-1 硬黑名单 / Z-2 启动硬顶 / Z-3 进池三选二 / Z-4 池管理
  # ═══════════════════════════════════════════════════════════════

  # ── Z-0 扫描节奏 ──
  scan_interval_sec: 30          # 全市场扫描间隔（秒）
  watchpool_max: 30              # 观察池容量（2026-04-19 50→30 恢复赚钱期）
  watchpool_refresh_sec: 60      # 池内指标重算间隔
  pool_ttl_hours: 24             # 进池后最长停留时间，超时未触发信号即踢

  # ── Z-1 硬黑名单 ──
  exclude_symbols:               # 大币排除（不适合妖币策略）
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
    - ADAUSDT
    - DOGEUSDT
    - TRXUSDT
    - AVAXUSDT
    - DOTUSDT
  mcap_exclude_top: 100          # CoinGecko 市值前100自动排除（24h刷新，2026-04-17 60→100）

  # ── RC-1 基础门 ──
  rc1_min_24h_volume_usdt: 20000000   # 24h 成交额 ≥ 2000万 U
  rc1_min_listing_days: 5             # 上线 ≥ 5 天
  rc1_min_oi_usdt: 5000000            # OI ≥ 500万 U

  # ── RC-2 进池触发（满足任一即进池）──
  rc2_burst_1m: 7                     # 1m > 7%
  rc2_burst_3m: 5                     # 3m > 5%
  rc2_burst_5m: 4                     # 5m > 4%
  rc2_burst_15m: 8                    # 15m > 8%
  rc2_stair_15m: 6                    # 慢涨侧门：15m > 6%
  rc2_stair_vol_ratio: 2.0            # + 量比 > 2x

  # ── RC-3 趋势过滤（4H EMA20，放最后，最贵）──
  rc3_trend_tf: "4h"
  rc3_ema_period: 20
  rc3_cache_minutes: 60               # 4H K线缓存 60 分钟

  # ── RC-4 反弹识别（便宜，先于 RC-3）──
  rc4_lookback_hours: 4
  rc4_max_drawdown_pct: 12
  rc4_rebound_threshold: 0.92

  # ── 池内管理 ──
  pool_freeze_gain_pct: 20       # 池内涨幅>20%冻结评分
  pool_ttl_hours: 24             # 进池后 24h 无信号踢出


  # ═══════════════════════════════════════════════════════════════
  # 分析层（过 Z 进池后，A-H 评分 → analyzer → 信号）
  # ═══════════════════════════════════════════════════════════════

  # ── 分析器总闸 ──
  analyzer:
    enabled: true
    signal_threshold: 60       # v3.5-minimalist: DN55+WL15+TP20+DD15=105满分，60分=至少DN+一个辅助

  # ── 信号最后一道防线：1m翻阴直接跳过本轮 ──
  signal_reject_1m_below: -1   # 1m涨幅<-1%判定回落中

  # ── C 层闸门（2026-04-19 替换量比倍数）──
  # 量比倍数对冷币基线敏感+是"已爆发"滞后指标；改用"加速度+买占比"三轴
  # 短期加速度=后2m均买入/前3m均买入  中期加速度=后5m均买入/前10m均买入
  # 闸门任一不过 → C维度=0分（不影响其他维度）
  c_buy_ratio_gate: 0.51              # 2026-04-19 18:40 55→51：55在池内微观结构下几乎永不亮，51让"明确偏多"进入档位评分（数据验证非FOMO）
  c_min_back_2m_usdt: 200000          # 最近2分钟主动买入<20万U → 冷清

  # ── 评分参数 v3.5-minimalist ──
  scoring:
    # DN. 动能涨幅（互斥取最高，阈值 7/5/4/8，分值 55/42/33/22）
    dn_reverse_guard: -1       # 反转守门：1m < -1% → DN = 0
    dn_burst_1m: 7             # 1m > 7%  → DN = 55
    dn_score_1m: 55
    dn_burst_3m: 5             # 3m > 5%  → DN = 42
    dn_score_3m: 42
    dn_burst_5m: 4             # 5m > 4%  → DN = 33
    dn_score_5m: 33
    dn_burst_15m: 8            # 15m > 8% → DN = 22
    dn_score_15m: 22

    # WL. 位置（互斥取最高，基准=进池价，早进高分追高降分）
    wl_score_tier1: 15         # 5-10%  早期最优
    wl_score_tier2: 12         # 10-15%
    wl_score_tier3: 8          # 15-25%
    wl_score_tier4: 3          # 25-40%
    # <5% 或 ≥40% → 0

    # TP. 突破因子（v3.5，1H 收盘突破前 6 根收盘高点）
    tp_lookback_1h: 6              # 回看 6 根 1H K 线
    tp_breakout_margin: 0.003      # 突破阈值 0.3%
    tp_wick_ratio_max: 0.40        # 上影线/全幅 < 40%
    tp_consolidation_range: 0.08   # 盘整判断：前高/前低-1 < 8%
    tp_cache_minutes: 60           # K 线缓存 60 分钟
    tp_super_score: 20             # 量≥2.5x + 盘整好
    tp_strong_score: 15            # 量≥2.0x
    tp_normal_score: 10            # 量≥1.5x
    tp_weak_score: 5               # 量<1.5x（弱突破，仍加分）

    # GG. 公告因子
    announce_new_listing: 3    # 新增合约（v3.4降权）
    announce_delist: -5        # 下架/SETTLING

    # AF. Alpha币加分（搜到合约=+2）
    h_alpha_bonus: 2

  # ═══════════════════════════════════════════════════════════════
  # 交易执行（仓位 / 移动止盈 / 滚仓 / 风控 / 冷却）
  # ═══════════════════════════════════════════════════════════════

  # ── 仓位 ──
  position_usd: 50
  default_leverage: 5
  max_position_usd: 50000
  max_slippage_pct: 2          # 滑点>2%放弃（v3.1简化）
  min_available_balance: 150   # 可用余额<150U跳过

  # ── 移动止盈（2026-04-25 统一走 trader.trailing_layered）──
  # 下掉币安原生 TRAILING_STOP_MARKET + trailing_limit 自建两条旧路径。
  # 所有买入成功后，buyer.py 调 trailing_layered.activate(profile=...)。
  # 参数定义在 /root/maomao/trader/trailing_layered.py PROFILES 字典：
  #   sniper_bull_limit  激活 25% / 回撤 20% / 减 100%（和原 trailing_limit 等价）
  #   sniper_bull_layer1 激活 15% / 回撤 10% / 减 100%
  #   sniper_bull_layer2 激活 35% / 回撤 15% / 减 100%
  # 要改参数 → 改 trailing_layered.py 的 PROFILES，不要在此处加开关。
  layered_trailing_profile: sniper_bull_limit

  # ── 滚仓 ──
  rolling:
    activation_pct: 90         # 浮盈≥90%触发（v3.1）
    profit_ratio: 0.6          # 加仓60%利润（v3.1）

  # ── 风控 ──
  max_concurrent_positions: 5
  daily_loss_limit_usd: 5000
  btc_circuit_breaker_pct: 2

  # ── 冷却 ──
  cooldown_after_tp_hours: 1           # 2026-04-26 0→1（DUSDT 止盈32s追高+12.7%根因）
  cooldown_after_sl_hours: 1.5         # 2026-04-26 16:42 改 3→1.5（复盘发现 ORCA 09:53/BSB 14:30 反弹大单会被 3h 误伤）
  cooldown_after_timeout_hours: 2      # 2026-04-26 0→2（24h没爆发的币需冷静期）
  cooldown_after_veto_min: 0           # v3.4测试模式全清零
  cooldown_price_release_pct: 0         # 2026-04-18 v3.4 100→0（关掉价格解除，避免止损后循环买入）
  cooldown_price_release_on_sl: false   # 2026-04-18 v3.4 true→false（止损冷却不受价格解除）
  position_timeout_hours: 24       # 持仓超时自动平仓

  # ── Stage 5.2 基础止损分级 ──
  stop_loss_30min_pct: 3             # 标准入场 30min 内止损 3%
  stop_loss_after_pct: 5             # 标准入场 30min 后止损 5%
  stop_loss_high_entry_30min: 2      # 高位入场（24h>30%）30min 内止损 2%
  stop_loss_high_entry_after: 3      # 高位入场 30min 后止损 3%
  high_entry_threshold_24h: 30       # 24h 涨幅超过此值视为高位入场
  sl_upgrade_window_minutes: 30      # 升级止损的等待时间（分钟）

  # ── Stage 5.3 两层移动止盈 ──
  trail_poll_interval_sec: 10        # trail 线程轮询间隔（秒）
  trail_layer1_activation_pct: 15    # Layer1 激活：浮盈峰值 ≥ 15%
  trail_layer1_pullback_pct: 10      # Layer1 回撤：利润回撤 ≥ 10% 触发
  trail_layer2_activation_pct: 35    # Layer2 激活：浮盈峰值 ≥ 35%（优先 layer1）
  trail_layer2_pullback_pct: 15      # Layer2 回撤：利润回撤 ≥ 15% 触发
